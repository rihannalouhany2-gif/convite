<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa - Convite Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes:wght@400&family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #5A0B2D 0%, #3D071C 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Loader */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #5A0B2D 0%, #3D071C 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeOut 0.8s ease-in-out 3s forwards;
        }

        .loader-content {
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(232, 197, 71, 0.3);
            border-top-color: #E8C547;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loader-content p {
            color: #E8C547;
            font-size: 16px;
            letter-spacing: 2px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* Container */
        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .container.hidden {
            display: none;
        }

        /* Envelope Section */
        .envelope-section {
            position: absolute;
            z-index: 10;
            transition: all 0.8s ease-in-out;
            opacity: 1;
            transform: scale(1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .envelope-section.closing {
            opacity: 0;
            transform: scale(0.8);
        }

        .envelope {
            width: 250px;
            height: 170px;
            background: #f5f5f5;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .envelope:hover {
            transform: translateY(-5px);
        }

        .envelope-flap {
            width: 0;
            height: 0;
            border-left: 125px solid transparent;
            border-right: 125px solid transparent;
            border-top: 85px solid #D4AF37;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top center;
            transition: transform 0.6s ease;
        }

        .envelope.open .envelope-flap {
            transform: rotateX(180deg) translateZ(-100px);
        }

        .envelope-body {
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            border: 2px solid #D4AF37;
        }

        .envelope-front {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(232, 197, 71, 0.1));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
        }

        .envelope-front::before {
            content: '💌';
        }

        .envelope-text {
            margin-top: 20px;
            color: #E8C547;
            font-size: 14px;
            text-align: center;
            letter-spacing: 1px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Invitation Container */
        .invitation-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #5A0B2D 0%, #3D071C 100%);
            z-index: 5;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .invitation-container.visible {
            display: flex !important;
        }

        /* Background */
        .invitation-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #5A0B2D 0%, #3D071C 100%);
            z-index: 1;
        }

        /* Golden Frame */
        .golden-frame {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            bottom: 25px;
            border: 2px solid #D4AF37;
            pointer-events: none;
            z-index: 2;
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.1), 0 0 30px rgba(212, 175, 55, 0.2);
        }

        /* Invitation Content */
        .invitation-content {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            padding: 30px;
            text-align: center;
            color: #E8C547;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .fade-in {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .om-symbol {
            font-size: 40px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        .celebration-text {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .ceremony-title {
            font-family: 'Great Vibes', cursive;
            font-size: 38px;
            font-weight: 400;
            text-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            margin: 0;
        }

        .honoring-text {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .couple-names {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 2px 0;
        }

        .separator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 3px 0;
        }

        .separator-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent);
        }

        .separator-diamond {
            width: 8px;
            height: 8px;
            background: #D4AF37;
            transform: rotate(45deg);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.8);
        }

        .date-section {
            margin: 3px 0;
        }

        .month {
            font-size: 12px;
            letter-spacing: 1px;
            margin: 0;
        }

        .day {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            font-weight: 900;
            line-height: 0.7;
            text-shadow: 0 8px 30px rgba(212, 175, 55, 0.3);
            margin: 0;
        }

        .year {
            font-size: 13px;
            letter-spacing: 1px;
            margin: 0;
        }

        .date-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 11px;
            margin: 2px 0;
        }

        .date-info p {
            margin: 0;
        }

        .party-info {
            margin: 3px 0;
        }

        .party-title {
            font-family: 'Great Vibes', cursive;
            font-size: 24px;
            margin: 0;
        }

        .venue-name {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .venue-address {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .footer {
            margin: 3px 0 0 0;
            padding-top: 3px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            font-size: 10px;
        }

        .confirmation-text {
            letter-spacing: 0.3px;
            margin: 0;
        }

        .contact-text {
            letter-spacing: 0.3px;
            margin: 1px 0 0 0;
        }

        .contact-text a {
            color: #E8C547;
            text-decoration: none;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: rgba(212, 175, 55, 0.2);
            border: 2px solid #D4AF37;
            color: #D4AF37;
            font-size: 18px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .close-btn:hover {
            background: rgba(212, 175, 55, 0.3);
            transform: rotate(90deg);
        }

        .close-btn.hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .envelope {
                width: 150px;
                height: 100px;
            }

            .envelope-flap {
                border-left: 75px solid transparent;
                border-right: 75px solid transparent;
                border-top: 50px solid #D4AF37;
            }

            .invitation-content {
                padding: 20px;
                gap: 2px;
            }

            .ceremony-title {
                font-size: 28px;
            }

            .couple-names {
                font-size: 18px;
            }

            .day {
                font-size: 40px;
            }

            .close-btn {
                width: 25px;
                height: 25px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="loader" class="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>Carregando sua surpresa...</p>
        </div>
    </div>

    <div id="mainContainer" class="container hidden">
        <div class="envelope-section">
            <div class="envelope" id="envelope">
                <div class="envelope-flap"></div>
                <div class="envelope-body">
                    <div class="envelope-front"></div>
                </div>
            </div>
            <p class="envelope-text">Clique para abrir</p>
        </div>

        <div id="invitationContent" class="invitation-container">
            <div class="invitation-background"></div>
            <div class="golden-frame"></div>

            <div class="invitation-content">
                <div class="om-symbol fade-in" style="animation-delay: 0.3s;">ॐ</div>

                <p class="celebration-text fade-in" style="animation-delay: 0.5s;">Junte-se a nós</p>
                <h1 class="ceremony-title fade-in" style="animation-delay: 0.7s;">Cerimônia Linda</h1>
                <p class="honoring-text fade-in" style="animation-delay: 0.9s;">Homenageando</p>
                <h2 class="couple-names fade-in" style="animation-delay: 1.1s;">ELIANE E EMERSON</h2>

                <div class="separator fade-in" style="animation-delay: 1.3s;">
                    <div class="separator-line"></div>
                    <div class="separator-diamond"></div>
                    <div class="separator-line"></div>
                </div>

                <div class="date-section fade-in" style="animation-delay: 1.5s;">
                    <p class="month">OUTUBRO</p>
                    <p class="day">17</p>
                    <p class="year">2026</p>
                    <div class="date-info">
                        <div><p>SÁBADO</p></div>
                        <div><p>11H - IGREJA SÃO PEDRO</p></div>
                    </div>
                </div>

                <div class="party-info fade-in" style="animation-delay: 1.7s;">
                    <p class="party-title">Festa 14h</p>
                    <p class="venue-name">Chácara Recanto do Gaúcho</p>
                    <p class="venue-address">Estrada dos Pereiras, 1054 - Suzano</p>
                </div>

                <div class="footer fade-in" style="animation-delay: 1.9s;">
                    <p class="confirmation-text">Confirme até 12/09/2026</p>
                    <p class="contact-text">📞 <a href="tel:+5511972615152">(11) 97261-5152</a> Rihanna</p>
                </div>
            </div>

            <button id="closeBtn" class="close-btn hidden">✕</button>
        </div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const mainContainer = document.getElementById('mainContainer');
        const envelope = document.getElementById('envelope');
        const envelopeSection = document.querySelector('.envelope-section');
        const invitationContent = document.getElementById('invitationContent');
        const closeBtn = document.getElementById('closeBtn');

        let envelopeOpen = false;

        window.addEventListener('load', () => {
            setTimeout(() => {
                mainContainer.classList.remove('hidden');
            }, 3000);
        });

        envelope.addEventListener('click', () => {
            if (!envelopeOpen) {
                openEnvelope();
            }
        });

        function openEnvelope() {
            envelopeOpen = true;
            envelope.classList.add('open');
            
            setTimeout(() => {
                envelopeSection.classList.add('closing');
                setTimeout(() => {
                    envelopeSection.style.display = 'none';
                    invitationContent.classList.add('visible');
                    closeBtn.classList.remove('hidden');
                    addGoldenGlitter();
                }, 800);
            }, 600);
        }

        closeBtn.addEventListener('click', () => {
            invitationContent.classList.remove('visible');
            closeBtn.classList.add('hidden');
            envelopeSection.style.display = 'flex';
            envelopeSection.classList.remove('closing');
            envelope.classList.remove('open');
            envelopeOpen = false;
        });

        function addGoldenGlitter() {
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const glitter = document.createElement('div');
                    glitter.style.cssText = `
                        position: fixed;
                        width: 3px;
                        height: 3px;
                        background: #D4AF37;
                        border-radius: 50%;
                        box-shadow: 0 0 6px #D4AF37;
                        pointer-events: none;
                        left: ${Math.random() * 100}%;
                        top: ${Math.random() * 100}%;
                        animation: twinkle 1.5s ease-in-out forwards;
                    `;
                    document.body.appendChild(glitter);
                    setTimeout(() => glitter.remove(), 1500);
                }, i * 150);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes twinkle {
                0%, 100% { opacity: 0; transform: scale(0); }
                50% { opacity: 1; transform: scale(1); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
